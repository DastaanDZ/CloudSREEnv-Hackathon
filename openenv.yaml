name: CloudSREEnv
version: "1.2.0"
description: >
  A high-fidelity SRE simulator featuring cascading failure dependencies 
  where database issues trigger upstream API performance bottlenecks.
author: OraTeam
license: MIT

environment:
  entrypoint: server/app.py
  class: CloudSREEnv
  port: 8000

tasks:
  - id: task1_tls_certificate_rca
    name: "TLS Certificate Expiry RCA"
    difficulty: easy
    description: >
      Investigate TLS handshake failures on auth-api. The agent must discover
      the expired certificate issue through logs. No local remediation available.
    success_criteria: >
      Final score 0.80: Agent performs GET_LOGS on auth-api and identifies
      certificate expiry without attempting RESTART or SCALE.
    max_steps: 10
    scenario: tls_certificate_expiry

  - id: task2_self_healing
    name: "Automated Recovery"
    difficulty: medium
    description: >
      Diagnose and restore a crashed service. Requires identifying the 
      Error state and issuing a RESTART command.
    success_criteria: >
      Final score 0.95: payment-db status returns to Running.
    max_steps: 15
    scenario: crash_loop

  - id: task3_latency_resolution
    name: "Cascading Latency Resolution"
    difficulty: hard
    description: >
      Complex Root Cause Analysis: Detect and fix a bottleneck where 
      payment-db slowness causes auth-api timeouts. Scaling the 
      API won't work; the database must be scaled first.
    success_criteria: >
      Final score 0.99: Both payment-db and auth-api return to 
      baseline latency thresholds.
    max_steps: 20
    scenario: performance_bottleneck

  - id: task4_resource_contention
    name: "Noisy Neighbor Resource Contention"
    difficulty: hard
    description: >
      Diagnose checkout latency where notification-worker has a memory leak and
      consumes 8000MB RAM, creating node memory pressure that throttles payment-db.
      The agent must avoid scaling the symptom service and fix the noisy neighbor.
    success_criteria: >
      Final score 1.00: Agent applies UPDATE_CONFIG to notification-worker with
      memory_limit_mb <= 2048, reducing memory pressure and restoring payment-db latency.
    max_steps: 20
    scenario: resource_contention

  - id: task5_split_brain_cache_consistency
    name: "Split-Brain Cache Consistency"
    difficulty: expert
    description: >
      Diagnose intermittent checkout cart mismatches and session failures caused
      by a split-brain cache cluster. The agent must avoid restarting checkout-api,
      compare session-cache-primary and session-cache-replica cache epochs, and
      repair the stale replica.
    success_criteria: >
      Final score 1.00: Agent inspects both cache nodes, detects divergent
      cache_epoch values, applies REPAIR_REPLICA to session-cache-replica, and
      restores checkout consistency.
    max_steps: 20
    scenario: split_brain_cache

reward_shaping:
  useful_diagnostic: +0.1
  hallucinated_service: -0.2
  unnecessary_restart: -0.5
  wrong_root_cause_scale: -0.35 # Discourages scaling payment-db in task4
  config_fix_bonus: +0.45      # Rewards constraining noisy-neighbor memory
  split_brain_evidence: +0.2   # Rewards checking both cache epochs in task5
  replica_repair_bonus: +0.5   # Rewards repairing session-cache-replica
  step_penalty: -0.02         # Encourages resolution speed
  cost_penalty: -0.1          # Discourages over-provisioning (>4000m CPU)
  task_completion_bonus: +0.9 # Final non-binary success signal

constraints:
  memory_limit_gb: 8
  max_runtime_minutes: 20
  deterministic_graders: true
